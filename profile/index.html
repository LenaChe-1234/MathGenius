<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MathGenius</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /><link rel="stylesheet" href="/styles.css" /></head>
  <body data-page-title-key="meta.profile" data-nav="profile">
    <header class="site-header"><div class="container header-inner"><a class="brand" href="/"><span class="brand-badge">MG</span><span data-i18n="brand.name">MathGenius</span></a><div class="header-actions"><nav class="nav"><a href="/" data-nav-link="dashboard" data-i18n="nav.dashboard">Dashboard</a><a href="/exams/" data-nav-link="exams" data-i18n="nav.exams">Exams</a><a href="/learn/" data-nav-link="learn" data-i18n="nav.learn">Learn</a><a href="/plan/" data-nav-link="plan" data-i18n="nav.plan">Study Plan</a><a href="/profile/" data-nav-link="profile" data-i18n="nav.profile">Profile</a></nav><div class="language-picker" id="language-picker"><button class="language-toggle" id="language-toggle" type="button" data-i18n-aria-label="lang.label" aria-label="Language" aria-haspopup="true" aria-expanded="false"><span class="language-flag" id="language-flag">EN</span><span class="language-arrow" aria-hidden="true"></span></button><ul class="language-menu" id="language-menu" hidden><li><button class="language-option" type="button" data-lang="en"><span class="language-flag">EN</span><span data-i18n="lang.en">English</span></button></li><li><button class="language-option" type="button" data-lang="de"><span class="language-flag">DE</span><span data-i18n="lang.de">German</span></button></li></ul></div></div></div></header>
    <main class="page-main"><section class="section"><div class="container"><div class="section-header"><div><div class="eyebrow" data-i18n="profile.badge">Profile</div><h1 data-i18n="profile.title">Keep profile information separate from learning and security</h1></div><p data-i18n="profile.subtitle">The profile page holds visible account details and learner preferences.</p></div><div class="profile-grid"><article class="card"><div class="field-group"><div class="field"><label for="profile-name" data-i18n="profile.name">Display name</label><input class="input" id="profile-name" type="text" data-i18n-placeholder="auth.placeholder.name" placeholder="Type your name" /></div><div class="field"><label for="profile-email" data-i18n="profile.email">Email</label><input class="input" id="profile-email" type="email" data-i18n-placeholder="auth.placeholder.email" placeholder="name@example.com" /></div></div></article><article class="card"><div class="field-group"><div class="field"><label for="profile-level" data-i18n="profile.level">Learning level</label><select class="select" id="profile-level"><option data-i18n="plan.level.option2">Grades 5-6</option><option data-i18n="plan.level.option3">Grades 7-8</option></select></div><div class="field"><label for="profile-goal" data-i18n="profile.goal">Learning goal</label><textarea class="textarea" id="profile-goal"></textarea></div></div><div class="actions" style="margin-top: 18px"><button class="btn btn-primary" type="button" data-i18n="profile.save">Save profile</button><a class="btn btn-secondary" href="/settings/security/" data-i18n="profile.security">Open security settings</a></div></article></div></div></section></main>
    <footer class="site-footer"><div class="container footer-box"><span data-i18n="footer.copy">MathGenius product structure prototype</span><span data-i18n="footer.note">Separated routes and shared UI system</span></div></footer>
    <script type="module" src="/scripts/app.js"></script>
  </body>
</html>
