<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MathGenius</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /><link rel="stylesheet" href="/styles.css" /></head>
  <body data-page-title-key="meta.reset" data-nav="profile">
    <main class="page-main"><section class="section"><div class="container"><div class="auth-layout"><article class="card soft"><div class="eyebrow" data-i18n="auth.reset.badge">Password reset</div><h1 data-i18n="auth.reset.title">Reset the password in its own flow</h1><p data-i18n="auth.reset.subtitle">Password reset belongs on its own route with a clear sequence and status messages.</p><div class="actions" style="margin-top: 18px"><a class="btn btn-secondary" href="/" data-i18n="auth.back">Back to dashboard</a></div></article><article class="card"><div class="field-group"><div class="field"><label for="reset-email" data-i18n="auth.email">Email</label><input class="input" id="reset-email" type="email" data-i18n-placeholder="auth.placeholder.email" placeholder="name@example.com" /></div><div class="field"><label for="reset-code" data-i18n="auth.code">Verification code</label><input class="input" id="reset-code" type="text" data-i18n-placeholder="auth.placeholder.code" placeholder="123456" /></div><div class="field"><label for="reset-password" data-i18n="auth.newPassword">New password</label><input class="input" id="reset-password" type="password" data-i18n-placeholder="auth.placeholder.password" placeholder="At least 8 characters" /></div></div><div class="actions" style="margin-top: 18px"><button class="btn btn-primary" type="button" data-i18n="auth.reset.button">Reset password</button></div><div class="alert info" aria-live="polite" style="margin-top: 18px">idle -> loading -> success / error</div></article></div></div></section></main>
    <script type="module" src="/scripts/app.js"></script>
  </body>
</html>
