<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MathGenius</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /><link rel="stylesheet" href="/styles.css" /></head>
  <body data-page-title-key="meta.signup" data-nav="profile">
    <main class="page-main"><section class="section"><div class="container"><div class="auth-layout"><article class="card soft"><div class="eyebrow" data-i18n="auth.signup.badge">Authentication</div><h1 data-i18n="auth.signup.title">Create an account on a focused sign-up page</h1><p data-i18n="auth.signup.subtitle">Sign-up should stay simple and separate from security and profile management.</p><div class="actions" style="margin-top: 18px"><a class="btn btn-secondary" href="/" data-i18n="auth.back">Back to dashboard</a></div></article><article class="card"><div class="field-group"><div class="field"><label for="signup-name" data-i18n="auth.name">Display name</label><input class="input" id="signup-name" type="text" data-i18n-placeholder="auth.placeholder.name" placeholder="Type your name" /></div><div class="field"><label for="signup-email" data-i18n="auth.email">Email</label><input class="input" id="signup-email" type="email" data-i18n-placeholder="auth.placeholder.email" placeholder="name@example.com" /></div><div class="field"><label for="signup-password" data-i18n="auth.password">Password</label><input class="input" id="signup-password" type="password" data-i18n-placeholder="auth.placeholder.password" placeholder="At least 8 characters" /></div></div><div class="actions" style="margin-top: 18px"><button class="btn btn-primary" type="button" data-i18n="auth.signup.button">Create account</button></div><div class="actions" style="margin-top: 18px"><a href="/login/" data-i18n="auth.signup.link">Already have an account? Log in</a></div></article></div></div></section></main>
    <script type="module" src="/scripts/app.js"></script>
  </body>
</html>
