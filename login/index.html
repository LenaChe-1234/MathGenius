<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MathGenius</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /><link rel="stylesheet" href="/styles.css" /></head>
  <body data-page-title-key="meta.login" data-nav="profile">
    <main class="page-main"><section class="section"><div class="container"><div class="auth-layout"><article class="card soft"><div class="eyebrow" data-i18n="auth.login.badge">Authentication</div><h1 data-i18n="auth.login.title">Log in on a dedicated page</h1><p data-i18n="auth.login.subtitle">The login flow should not compete with learning and progress on the same screen.</p><div class="actions" style="margin-top: 18px"><a class="btn btn-secondary" href="/" data-i18n="auth.back">Back to dashboard</a></div></article><article class="card"><div class="field-group"><div class="field"><label for="login-email" data-i18n="auth.email">Email</label><input class="input" id="login-email" type="email" data-i18n-placeholder="auth.placeholder.email" placeholder="name@example.com" /></div><div class="field"><label for="login-password" data-i18n="auth.password">Password</label><input class="input" id="login-password" type="password" data-i18n-placeholder="auth.placeholder.password" placeholder="At least 8 characters" /></div></div><div class="actions" style="margin-top: 18px"><button class="btn btn-primary" type="button" data-i18n="auth.login.button">Log in</button></div><div class="actions" style="margin-top: 18px"><a href="/signup/" data-i18n="auth.login.link">Need an account? Sign up</a><a href="/reset-password/" data-i18n="auth.reset.link">Forgot your password?</a></div></article></div></div></section></main>
    <script type="module" src="/scripts/app.js"></script>
  </body>
</html>
